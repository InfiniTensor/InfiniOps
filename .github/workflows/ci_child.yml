name: CI Child Pipeline

on:
  workflow_call:
    inputs:
      matrix_json:
        description: "Matrix JSON generated from .ci/config.yaml"
        required: true
        type: string

jobs:
  platform-jobs:
    # Matrix expands into independent jobs (one per platform/job entry),
    # not serial steps in a single job. If a platform runner is busy/offline,
    # only that matrix entry stays queued.
    name: ${{ matrix.id }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(inputs.matrix_json) }}
    runs-on: self-hosted
    timeout-minutes: ${{ matrix.timeout_minutes }}
    steps:
      - name: Show stage plan
        env:
          MATRIX_JSON: ${{ inputs.matrix_json }}
          CURRENT_JOB: ${{ matrix.id }}
        run: |
          python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["MATRIX_JSON"])
          current = os.environ["CURRENT_JOB"]
          entry = next((x for x in data.get("include", []) if x.get("id") == current), None)
          if not entry:
              print(f"[warn] matrix entry not found for {current}")
              raise SystemExit(0)

          test_cmd = entry.get("test_cmd", "")
          lines = [
              f"job: {entry.get('id')}",
              f"platform: {entry.get('platform')}",
              "stage order:",
              "  1) setup",
              f"  2) test -> {test_cmd}",
          ]
          text = "\n".join(lines)
          print(text)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as f:
                  f.write("### Stage plan\n\n")
                  f.write("```\n")
                  f.write(text)
                  f.write("\n```\n\n")
          PY

      - name: Trigger Nvidia GPU Smoke Test job
        env: ${{ matrix.job_env }}
        run: |
              echo "Smoke Test Starting..."
              echo "MODEL_LIST = ${{ matrix.job_env.MODEL_LIST }}"
              echo "Version = ${{ matrix.job_env.IMAGE }}"
              set -m
              cd /home/zkjh
              if [ ! -d "${{ matrix.platform }}_test" ]; then
                mkdir -p "${{ matrix.platform }}_test"
              fi
              cd ${{ matrix.platform }}_test
              mkdir -p ${{ matrix.platform }}_${{ github.run_id }}_${{ matrix.id }}
              cd ${{ matrix.platform }}_${{ github.run_id }}_${{ matrix.id }}
              git init
              git remote add origin git@github.com:Vincent777/ci_autotest.git
              git fetch --depth=1 origin main
              git show origin/main:ascend_test_suite/daemon.sh > daemon.sh
              chmod a+x daemon.sh
              echo '${{ toJson(matrix.docker_args) }}'
              echo '${{ toJson(matrix.volumes) }}'
              echo '${{ toJson(matrix.shm_size) }}'
