name: CI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to run"
        type: choice
        required: true
        default: nvidia
        options:
          - nvidia
          - iluvatar
          - metax
          - moore
          - cambricon
          - all
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  ci:
    uses: InfiniTensor/ci/.github/workflows/infiniops-ci.yml@codex/prune-unused-ci-artifacts
    with:
      config_path: .github/ci_config.yml
      ci_ref: codex/prune-unused-ci-artifacts
      platform: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' && 'nvidia,iluvatar,metax,moore,cambricon' || inputs.platform) || 'nvidia,iluvatar,metax,moore,cambricon' }}
    secrets: inherit
