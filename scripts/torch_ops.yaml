# Allowlist of ATen ops to expose as InfiniOps operators.
#
# `scripts/generate_torch_ops.py` finds the `.out` variant of each entry in
# `native_functions.yaml` and emits a base class plus a PyTorch backend
# specialization at slot `_PYTORCH_SLOT` that wraps `at::<op>_out`.  Ops
# already implemented natively in InfiniOps (e.g. `add`, `gemm`) are
# skipped automatically; ops whose schema the generator cannot parse
# (unsupported scalar types, complex overloads, etc.) are skipped with a
# warning and recorded under `skipped:` in the generator output.
#
# Adding an op here automatically extends `tests/test_torch_ops.py` via
# the metadata file the generator emits.

# Unary float-domain ops
- abs
- neg
- sign
- sgn
- reciprocal
- square
- sqrt
- rsqrt
- exp
- exp2
- expm1
- log
- log2
- log10
- log1p
- ceil
- floor
- round
- trunc
- frac
- sin
- cos
- tan
- sinh
- cosh
- tanh
- asin
- acos
- atan
- asinh
- acosh
- atanh
- erf
- erfc
- erfinv
- lgamma
- digamma
- i0
- sinc
- sigmoid
- silu
- mish
- hardsigmoid
- hardswish
- deg2rad
- rad2deg

